index.html<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Am So Sorry</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Light Pink Background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #d81b60; font-size: 2.5rem; }
        p { color: #555; font-size: 1.2rem; line-height: 1.6; }
        .emoji { font-size: 4rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🥺</div>
        <h1>I'm Sorry</h1>
        <p>Mujhse galti ho gayi, please maaf kar do. Tumhari smile mere liye sabse zyada important hai. ✨</p>
    </div>
</body>
</html>
